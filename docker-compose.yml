services:
  web:
    image: nginx:alpine
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /usr/share/nginx/html
        if [ ! -f /usr/share/nginx/html/index.html ]; then
          wget -qO /usr/share/nginx/html/index.html https://raw.githubusercontent.com/titolindj/ozoneconvention-landing/main/index.html
          wget -qO /usr/share/nginx/html/logo.png https://raw.githubusercontent.com/titolindj/ozoneconvention-landing/main/logo.png
        fi
        nginx -g 'daemon off;'
    volumes:
      - site-data:/usr/share/nginx/html
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ozoneconvention.rule=Host('ozoneconvention.com') || Host('www.ozoneconvention.com')"
      - "traefik.http.routers.ozoneconvention.entrypoints=websecure"
      - "traefik.http.routers.ozoneconvention.tls=true"
      - "traefik.http.services.ozoneconvention.loadbalancer.server.port=80"

  filebrowser:
    image: filebrowser/filebrowser:latest
    restart: always
    volumes:
      - site-data:/srv
    environment:
      - FB_PORT=8080
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ozonefb.rule=Host('files.ozoneconvention.com')"
      - "traefik.http.routers.ozonefb.entrypoints=websecure"
      - "traefik.http.routers.ozonefb.tls=true"
      - "traefik.http.services.ozonefb.loadbalancer.server.port=8080"

volumes:
  site-data:

networks:
  dokploy-network:
    external: true
